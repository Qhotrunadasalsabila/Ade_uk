<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Sweet 16 Boy ✨</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}


body{
height:100vh;
overflow-x:hidden;
overflow-y:auto;


background:
radial-gradient(circle at top,#2563eb,#020617 75%);

color:white;
}

.screen{
min-height:100vh;
height:auto;
}
@media (max-width: 480px){
.star, .shoot{
display:none;
}
}

/* cinematic light */

body::before{

content:"";

position:fixed;

inset:0;

background:
linear-gradient(
120deg,
transparent,
rgba(56,189,248,.15),
transparent
);

animation:
lightMove 6s infinite;

pointer-events:none;

}


@keyframes lightMove{

0%{
transform:translateX(-100%);
}

100%{
transform:translateX(100%);
}

}




.cursor{

position:fixed;

width:250px;

height:250px;

background:#38bdf8;

border-radius:50%;

filter:blur(120px);

opacity:.25;

pointer-events:none;

}




.star{

position:absolute;

color:white;

animation:
starMove linear infinite;

}


@keyframes starMove{


from{

transform:translateY(-20px);

}


to{

transform:translateY(110vh);

opacity:0;

}


}





.shoot{

position:absolute;

width:160px;

height:3px;

background:white;

box-shadow:
0 0 20px #38bdf8;

transform:rotate(-35deg);

animation:
shoot 1s linear;

}


@keyframes shoot{


to{

transform:
translate(500px,500px)
rotate(-35deg);

opacity:0;

}

}




.screen{

position:absolute;

inset:0;

display:flex;

align-items:center;

justify-content:center;

}



.hidden{

display:none;

}


.card{
width:90%;
max-width:650px;
padding:40px;
text-align:center;

background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border-radius:30px;
border:1px solid #ffffff33;
box-shadow:0 0 40px #38bdf8;

max-height:85vh;
overflow-y:auto;

/* smooth scrolling */
scrollbar-width: thin;
scrollbar-color: #38bdf8 rgba(255,255,255,.1);
}
/* scrollbar style */
.card::-webkit-scrollbar{
width:6px;
}

.card::-webkit-scrollbar-track{
background:rgba(255,255,255,.08);
border-radius:10px;
}

.card::-webkit-scrollbar-thumb{
background:#38bdf8;
border-radius:10px;
box-shadow:0 0 10px #38bdf8;
}

.card::-webkit-scrollbar-thumb:hover{
background:#7dd3fc;
}
@keyframes cinema{


from{

opacity:0;

transform:
scale(.85)
translateY(30px);

filter:blur(10px);

}


to{

opacity:1;

transform:
scale(1)
translateY(0);

filter:blur(0);

}

}



h1{

font-size:45px;

color:#7dd3fc;


text-shadow:
0 0 20px #38bdf8;

}




p{

font-size:18px;

line-height:1.8;

}





#count{

font-size:140px;

color:#93c5fd;

animation:
zoom 1s;

}



@keyframes zoom{

from{

transform:scale(.2);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}





#gift{

display:none;

font-size:100px;

cursor:pointer;

animation:
float 2s infinite;

}



#gift.show{

display:block;

}




@keyframes float{

50%{

transform:
translateY(-20px);

}

}


.date{

margin-top:12px;

font-size:22px;

letter-spacing:5px;

color:#bae6fd;

animation:
dateIn 1.5s ease;


text-shadow:
0 0 20px #38bdf8;

}

@keyframes dateIn{


from{

opacity:0;

transform:
scale(.5)
translateY(-20px);

}


to{

opacity:1;

transform:
scale(1)
translateY(0);

}

}




.time{

margin-top:12px;

font-size:20px;

letter-spacing:3px;

text-shadow:
0 0 15px #38bdf8;

}



.location{

margin-top:8px;

font-size:14px;

color:#cbd5e1;

letter-spacing:2px;

}

#typing::after{

content:"|";

animation:
blink .7s infinite;

}


@keyframes blink{

50%{
opacity:0;
}

}

#letter{
display:none;
overflow-y:auto;
padding:20px;
-webkit-overflow-scrolling:touch;
}

#letter.show{

display:flex;

}

#letterText{
white-space:pre-line;
text-align:left;
}

.cake{

font-size:90px;

}



#candle{

font-size:45px;

cursor:pointer;

animation:
flame 1s infinite;

}



@keyframes flame{


50%{

transform:
translateY(-10px);

}

}


.fire{

position:absolute;

font-size:30px;

animation:
boom 2s linear;

}


@keyframes boom{


from{

transform:scale(.2);

opacity:1;

}


to{

transform:scale(3);

opacity:0;

}

}





.confetti{

position:absolute;

font-size:25px;

animation:
drop 3s linear;

}



@keyframes drop{


to{

transform:
translateY(100vh)
rotate(720deg);

opacity:0;

}

}




@media(max-width:600px){


h1{

font-size:32px;

}


.card{

padding:25px;

}

}
/* ===== RESPONSIVE FIX (TANPA MERUBAH DESAIN) ===== */

@media (max-width: 768px){

h1{
font-size:34px;
}

#count{
font-size:90px;
}

#gift{
font-size:70px;
}

.card{
padding:25px;
max-height:80vh;
}

.time{
font-size:16px;
}

.date{
font-size:18px;
letter-spacing:2px;
}

.location{
font-size:12px;
}

p{
font-size:15px;
line-height:1.6;
}
}

@media (max-width: 480px){

h1{
font-size:28px;
}

#count{
font-size:70px;
}

#gift{
font-size:60px;
}

.card{
padding:18px;
border-radius:20px;
}

.cursor{
width:150px;
height:150px;
filter:blur(90px);
}

}


</style>
</head>


<body>


<div class="cursor"></div>


<div id="countdown" class="screen">

<div id="count">3</div>

</div>



<div id="main" class="screen hidden">


<div class="card">


<h1>
Happy Sweet 16 Boy ✨
</h1>


<div class="date">
07 • 07 • 2026
</div>


<div class="time" id="clock">
🕒 00:00:00
</div>


<div class="location">
📍 Made with love from caca
</div>


<br>


<div id="typing"></div>


<div id="gift" onclick="openGift()">
🎁
</div>


<p>
Klik hadiah untuk membuka
</p>


</div>

</div>


<div id="letter" class="screen">


<div class="card">


<h1>
💌 for ukasyah
</h1>


<p id="letterText"></p>


<div class="cake">
🎂
</div>


<div id="candle" onclick="blowCandle()">
🕯️
</div>


<p>
Klik lilin untuk meniup ✨
</p>


</div>

</div>


<audio id="music" loop>

<source src="Already Free - ALEPH (128k).mp3">

</audio>
<script>


/* cursor glow */

let cursor =
document.querySelector(".cursor");


document.addEventListener(
"mousemove",
e=>{

cursor.style.left =
e.clientX-125+"px";

cursor.style.top =
e.clientY-125+"px";

});





/* stars */

for(let i=0;i<100;i++){

let s=document.createElement("div");

s.className="star";

s.innerHTML="✦";

s.style.left=
Math.random()*100+"vw";

s.style.fontSize=
5+Math.random()*15+"px";


s.style.animationDuration=
3+Math.random()*7+"s";


document.body.appendChild(s);

}






/* shooting star */


setInterval(()=>{


let s=document.createElement("div");


s.className="shoot";


s.style.left=
Math.random()*80+"vw";


s.style.top=
Math.random()*40+"vh";


document.body.appendChild(s);



setTimeout(()=>{

s.remove();

},1000);



},3000);







/* countdown */

let n=3;


let cd=setInterval(()=>{


document
.getElementById("count")
.innerHTML=n;



n--;



if(n<0){


clearInterval(cd);



document
.getElementById("countdown")
.classList.add("hidden");



document
.getElementById("main")
.classList.remove("hidden");



document
.getElementById("gift")
.classList.add("show");



}



},1000);







/* typing */

let intro =
"Aku punya kejutan kecil khusus untuk hari spesialmu ✨";


let a=0;



function typing(){


if(a<intro.length){


document
.getElementById("typing")
.innerHTML+=intro[a];


a++;


setTimeout(
typing,
60
);


}


}


setTimeout(
typing,
3500
);








/* gift */


function openGift(){


fireworks();


document
.getElementById("main")
.classList.add("hidden");


document
.getElementById("letter")
.classList.add("show");


typeLetter();


musicFade();



}








/* letter */
let text =

"I don't  say \"Happy Birthday.\" but Today, I lift all my prayers to the sky for you.\n\n"+

"Semoga semua yang kamu impikan, cita-citakan, dan perjuangkan perlahan menjadi kenyataan.\n\n"+

"Semoga segala hal yang pernah membuatmu runtuh justru menjadi alasanmu untuk tumbuh menjadi pribadi yang lebih kuat.\n\n"+

"Semoga ALLAH selalu menjagamu di mana pun kamu berada, hari-harimu dipenuhi cinta yang tak pernah ada batasnya, kebahagiaan yang tulus, kesehatan yang selalu menyertaimu, serta umur yang panjang agar kamu bisa menikmati setiap keindahan hidup.\n\n"+

"Live well. I will always pray for you from here, and I will always support every choice you make as long as it brings goodness to your life.\n\n"+

"I hope my prayers hug you whenever my arms can't.\n\n"+

"And lastly, thank you so much. I'm truly grateful and happy to know you.\n\n"+

"Selamat bertambah usia. Semoga semua doa baik hari ini menjadi awal dari banyak kebahagiaan yang akan selalu menemukanmu. 🤍\n\n"+

"Happy Sweet 16 Ukasyah 🎉";
let b=0;



function typeLetter(){


let box =
document.getElementById("letterText");



function run(){


if(b<text.length){


box.innerHTML +=

text[b]=="\n"
?
"<br>"
:
text[b];



b++;


setTimeout(
run,
45
);


}


}



run();


}


/* music fade */

function musicFade(){


let m =
document.getElementById("music");


m.play()
.catch(()=>{});



let v=0;



let fade =
setInterval(()=>{


v+=.05;


m.volume=v;



if(v>=.5)

clearInterval(fade);



},200);



}



/* candle */


function blowCandle(){


document
.getElementById("candle")
.innerHTML="💨";


fireworks();


confetti();



}



/* fireworks */


function fireworks(){



for(let i=0;i<100;i++){


let f=document.createElement("div");


f.className="fire";


f.innerHTML=
["✨","🎆","⭐"]
[
Math.floor(
Math.random()*3
)
];



f.style.left=
Math.random()*100+"vw";


f.style.top=
Math.random()*100+"vh";



document.body.appendChild(f);



setTimeout(()=>{

f.remove();

},2000);



}



}



/* confetti */


function confetti(){


for(let i=0;i<80;i++){



let c=document.createElement("div");



c.className="confetti";



c.innerHTML="✨";



c.style.left=
Math.random()*100+"vw";



document.body.appendChild(c);



setTimeout(()=>{

c.remove();

},3000);



}



}



/* realtime clock */


function updateClock(){


let now =
new Date();



let h =
String(now.getHours())
.padStart(2,"0");



let m =
String(now.getMinutes())
.padStart(2,"0");



let s =
String(now.getSeconds())
.padStart(2,"0");



document
.getElementById("clock")
.innerHTML =
"🕒 "+h+":"+m+":"+s;



}



setInterval(
updateClock,
1000
);


updateClock();





/* fallback music */

document.body.addEventListener(
"click",
()=>{

let m =
document.getElementById("music");


m.play()
.catch(()=>{});


},
{
once:true
}
);



</script>


  
</body>
</html>
